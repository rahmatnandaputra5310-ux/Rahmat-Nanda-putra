<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayo Belajar!</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#d7dde8,#6b8fcf);overflow:hidden} .card{background:rgba(255,255,255,.9);padding:30px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.15);text-align:center;max-width:420px;width:90%;position:relative} h1{color:#355a9a;margin:0 0 10px} p{color:#555} .stickers{font-size:42px;margin:10px 0} .btns{position:relative;height:90px;margin-top:20px} button{border:none;padding:14px 24px;border-radius:14px;font-size:18px;font-weight:bold;cursor:pointer;transition:.25s} #yes{background:#4b78c2;color:#fff;margin-right:10px} #no{background:#9aa8bf;color:#fff;position:absolute;left:210px;top:0} #message{margin-top:18px;font-size:20px;font-weight:bold;color:#355a9a;min-height:30px} .footer{margin-top:12px;color:#666;font-size:14px}
</style>
</head>
<body>
<div class="card">
<div class="stickers">📚✨🧠🎓</div>
<h1>Ayo Belajar!</h1>
<p>Mau mulai belajar hari ini?</p>
<div class="btns">
<button id="yes">Mau 😊</button>
<button id="no">Tidak 😅</button>
</div>
<div id="message"></div>
<div class="footer">Sedikit belajar setiap hari = hasil besar 🚀</div>
</div>
<script>
const yes=document.getElementById('yes');
const no=document.getElementById('no');
const msg=document.getElementById('message');
const texts=[
 'Hebat! Semangat belajar membawa masa depan cerah! 🌟',
 'Pilihan bagus! Ilmu adalah kekuatan! 💪📘',
 'Keren! Hari ini kamu selangkah lebih maju! 🚀',
 'Mantap! Belajar membuatmu semakin pintar! 🧠'
];
yes.onclick=()=>{msg.textContent=texts[Math.floor(Math.random()*texts.length)]};
function moveBtn(){
 const area=document.querySelector('.btns');
 const maxX=area.clientWidth-no.offsetWidth;
 const maxY=area.clientHeight-no.offsetHeight;
 no.style.left=Math.random()*maxX+'px';
 no.style.top=Math.random()*maxY+'px';
}
no.addEventListener('mouseenter',moveBtn);
no.addEventListener('click',moveBtn);
no.addEventListener('touchstart',moveBtn);
</script>
</body>
</html>
